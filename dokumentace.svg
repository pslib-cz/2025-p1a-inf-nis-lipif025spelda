<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%" style="background-color: #f8f9fa;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <marker id="dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6">
      <circle cx="5" cy="5" r="3" fill="#4a5568"/>
    </marker>
  </defs>

  <text x="30" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#2d3748">ER Diagram: Systém hodnocení školních obědů</text>

  <g transform="translate(50, 80)" filter="url(#shadow)">
    <rect width="220" height="150" rx="8" fill="#ffffff" stroke="#4299e1" stroke-width="2"/>
    <path d="M 0,8 Q 0,0 8,0 L 212,0 Q 220,0 220,8 L 220,35 L 0,35 Z" fill="#4299e1"/>
    <text x="110" y="22" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Uzivatel</text>
    <text x="15" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2b6cb0">PK</text>
    <text x="45" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2d3748">id_uzivatele</text>
    <text x="160" y="55" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="45" y="75" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">jmeno</text>
    <text x="160" y="75" font-family="Segoe UI, Arial" font-size="11" fill="#718096">VARCHAR</text>
    
    <text x="45" y="95" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">email</text>
    <text x="160" y="95" font-family="Segoe UI, Arial" font-size="11" fill="#718096">VARCHAR</text>
    
    <text x="45" y="115" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">heslo</text>
    <text x="160" y="115" font-family="Segoe UI, Arial" font-size="11" fill="#718096">VARCHAR</text>
    
    <text x="45" y="135" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">role</text>
    <text x="160" y="135" font-family="Segoe UI, Arial" font-size="11" fill="#718096">ENUM</text>
  </g>

  <g transform="translate(630, 80)" filter="url(#shadow)">
    <rect width="220" height="150" rx="8" fill="#ffffff" stroke="#48bb78" stroke-width="2"/>
    <path d="M 0,8 Q 0,0 8,0 L 212,0 Q 220,0 220,8 L 220,35 L 0,35 Z" fill="#48bb78"/>
    <text x="110" y="22" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Obed</text>
    <text x="15" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2f855a">PK</text>
    <text x="45" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2d3748">id_obeda</text>
    <text x="160" y="55" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="45" y="75" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">nazev</text>
    <text x="160" y="75" font-family="Segoe UI, Arial" font-size="11" fill="#718096">VARCHAR</text>
    
    <text x="45" y="95" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">foto_url</text>
    <text x="160" y="95" font-family="Segoe UI, Arial" font-size="11" fill="#718096">VARCHAR</text>
    
    <text x="45" y="115" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">datum_podavani</text>
    <text x="160" y="115" font-family="Segoe UI, Arial" font-size="11" fill="#718096">DATE</text>
    
    <text x="45" y="135" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">cislo_nabidky</text>
    <text x="160" y="135" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
  </g>

  <g transform="translate(160, 420)" filter="url(#shadow)">
    <rect width="240" height="150" rx="8" fill="#ffffff" stroke="#ed8936" stroke-width="2"/>
    <path d="M 0,8 Q 0,0 8,0 L 232,0 Q 240,0 240,8 L 240,35 L 0,35 Z" fill="#ed8936"/>
    <text x="120" y="22" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Hodnoceni (Palce)</text>
    <text x="15" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#c05621">PK</text>
    <text x="45" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2d3748">id_hodnoceni</text>
    <text x="175" y="55" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="15" y="75" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#a0522d">FK</text>
    <text x="45" y="75" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">id_uzivatele</text>
    <text x="175" y="75" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="15" y="95" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#a0522d">FK</text>
    <text x="45" y="95" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">id_obeda</text>
    <text x="175" y="95" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="45" y="115" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">typ_hlasu</text>
    <text x="175" y="115" font-family="Segoe UI, Arial" font-size="11" fill="#718096">BOOLEAN</text>
    
    <text x="45" y="135" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">datum_hlasovani</text>
    <text x="175" y="135" font-family="Segoe UI, Arial" font-size="11" fill="#718096">TIMESTAMP</text>
  </g>

  <g transform="translate(500, 420)" filter="url(#shadow)">
    <rect width="240" height="150" rx="8" fill="#ffffff" stroke="#9f7aea" stroke-width="2"/>
    <path d="M 0,8 Q 0,0 8,0 L 232,0 Q 240,0 240,8 L 240,35 L 0,35 Z" fill="#9f7aea"/>
    <text x="120" y="22" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Komentar</text>
    <text x="15" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#6b46c1">PK</text>
    <text x="45" y="55" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2d3748">id_komentare</text>
    <text x="175" y="55" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="15" y="75" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#a0522d">FK</text>
    <text x="45" y="75" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">id_uzivatele</text>
    <text x="175" y="75" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="15" y="95" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#a0522d">FK</text>
    <text x="45" y="95" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">id_obeda</text>
    <text x="175" y="95" font-family="Segoe UI, Arial" font-size="11" fill="#718096">INT</text>
    
    <text x="45" y="115" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">text_komentare</text>
    <text x="175" y="115" font-family="Segoe UI, Arial" font-size="11" fill="#718096">TEXT</text>
    
    <text x="45" y="135" font-family="Segoe UI, Arial" font-size="12" fill="#2d3748">datum_vlozeni</text>
    <text x="175" y="135" font-family="Segoe UI, Arial" font-size="11" fill="#718096">TIMESTAMP</text>
  </g>

  <path d="M 160,230 L 160,330 L 220,330 L 220,420" fill="none" stroke="#4a5568" stroke-width="2" marker-start="url(#dot)"/>
  <text x="170" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">1</text>
  <text x="230" y="405" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">N</text>

  <path d="M 110,230 L 110,360 L 560,360 L 560,420" fill="none" stroke="#4a5568" stroke-width="2" marker-start="url(#dot)"/>
  <text x="120" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">1</text>
  <text x="570" y="405" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">N</text>

  <path d="M 790,230 L 790,330 L 340,330 L 340,420" fill="none" stroke="#4a5568" stroke-width="2" marker-start="url(#dot)"/>
  <text x="775" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">1</text>
  <text x="350" y="405" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">N</text>

  <path d="M 740,230 L 740,360 L 680,360 L 680,420" fill="none" stroke="#4a5568" stroke-width="2" marker-start="url(#dot)"/>
  <text x="725" y="250" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">1</text>
  <text x="690" y="405" font-family="Arial" font-size="14" font-weight="bold" fill="#4a5568">N</text>

  <g transform="translate(30, 600)">
    <circle cx="10" cy="10" r="5" fill="#4a5568" stroke="#4a5568" marker-start="url(#dot)"/>
    <text x="25" y="14" font-family="Segoe UI, Arial" font-size="12" fill="#718096">Vztah 1 ku N (Jeden uživatel/oběd může mít více hodnocení/komentářů)</text>
  </g>
</svg>
